    .chart-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .special-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; margin-top:14px; }
    .chart-meta { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
    .chip { display:inline-block; border:1px solid var(--line); background:rgba(255,250,242,0.92); border-radius:999px; padding:3px 8px; font-size:12px; color:var(--muted); }

    .widget-meta { margin-top:8px; color:var(--muted); font-size:12px; line-height:1.5; }
    .sources { margin:0; padding-left:18px; color:#334155; line-height:1.7; }
    @media (max-width:1100px) { .special-grid { grid-template-columns:1fr; } }
    @media (max-width:960px) { .grid-4,.grid-2,.chart-grid { grid-template-columns:1fr; } }

        const tickValue = maxV - ((maxV - minV) / 3) * i;
        const gy = padY + (plotH / 3) * i + 4;
        let labelText = Number(tickValue).toLocaleString('en-US', { maximumFractionDigits: 1 });
      if (item.unit === '$') labelText = '$' + labelText;
      if (item.unit === '%') labelText += '%';
      if (item.unit === 'x') labelText += 'x';
      ticks.push(`<text x="2" y="${gy}" fill="#6b7280" font-size="10">${labelText}</text>`);
      }

      const d = values.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(v)}`).join(' ');
      const points = values.map((v, i) => `<circle cx="${x(i)}" cy="${y(v)}" r="3.2" fill="${color}"></circle>`).join('');
      const labelIndexes = values.length <= 8
        ? values.map((_, i) => i)
        : Array.from(new Set(Array.from({ length: 8 }, (_, i) => Math.round((values.length - 1) * i / 7))));
      const labels = labelIndexes.map(i => `<div>${item.dates[i].slice(5)}</div>`).join('');

      const card = document.createElement('div');
      card.className = 'chart-card';
      card.innerHTML = `<div class="chart-meta"><div><h3>${label}</h3><span class="chip">${item.category}</span></div><div class="${klass}">${change > 0 ? '+' : ''}${change.toFixed(2)}%</div></div><svg class="mini-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-label="${label} chart">${grid.join('')}${ticks.join('')}<path d="${d}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>${points}</svg><div class="labels" style="grid-template-columns:repeat(${labelIndexes.length},minmax(0,1fr))">${labels}</div>${footerText ? `<div class="widget-meta">${footerText}</div>` : ''}`;
      return card;
    };

    Object.entries(series).forEach(([label, item], idx) => {
      if (label === 'Fear & Greed' || label === 'Bitcoin (USD)' || label === 'BIT/GOLD') { return; }
      const card = buildLineChartCard(label, item, colors[idx % colors.length]);
      chartGrid.appendChild(card);
    });

    if (series['Fear & Greed']) {
      specialGrid.appendChild(buildLineChartCard('Fear & Greed', series['Fear & Greed'], '#334155'));
    }

    if (series['Bitcoin (USD)']) {
      specialGrid.appendChild(buildLineChartCard('Bitcoin (USD)', series['Bitcoin (USD)'], '#f7931a', '자료 출처: TradingView · BITSTAMP:BTCUSD · Nasdaq 종가 시점 정렬'));
    }

    if (series['BIT/GOLD']) {
      specialGrid.appendChild(buildLineChartCard('BIT/GOLD', series['BIT/GOLD'], '#8b5cf6', '자료 출처: TradingView · BITSTAMP:BTCUSD / OANDA:XAUUSD · Nasdaq 종가 시점 정렬'));
    }

    dailyNews.forEach(item => {
      const card = document.createElement('div');
      card.className = 'news-card';
      const bullets = item.bullets.map(x => `<li>${x}</li>`).join('');
      card.innerHTML = `<div class="news-date">${item.date}</div><h3>${item.headline}</h3><ul>${bullets}</ul>`;
      dailyGrid.appendChild(card);
    });

  </script>
</body>
</html>
